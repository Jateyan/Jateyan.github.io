<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="50px" viewBox="0 0 200 50" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>柠檬小站Logo</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="logoGradient">
            <stop stop-color="#41B883" offset="0%"></stop>
            <stop stop-color="#3498db" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Code Bracket -->
        <path d="M25,10 L15,25 L25,40" stroke="url(#logoGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M45,10 L55,25 L45,40" stroke="url(#logoGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
        
        <!-- Lemon Icon -->
        <circle cx="35" cy="25" r="15" fill="#FFED66" opacity="0.5"></circle>
        
        <!-- Text -->
        <text font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333333">
            <tspan x="70" y="33">柠檬小站</tspan>
        </text>
    </g>
</svg> 