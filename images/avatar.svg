<?xml version="1.0" encoding="UTF-8"?>
<svg width="200px" height="200px" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>前端开发者头像</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="avatarGradient">
            <stop stop-color="#41B883" offset="0%"></stop>
            <stop stop-color="#3498db" offset="50%"></stop>
            <stop stop-color="#61DAFB" offset="100%"></stop>
        </linearGradient>
        <circle id="avatarCircle" cx="100" cy="100" r="95"></circle>
        <clipPath id="avatarClip">
            <use xlink:href="#avatarCircle" />
        </clipPath>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Background -->
        <use fill="#F8F8F8" xlink:href="#avatarCircle"></use>
        <use stroke="url(#avatarGradient)" stroke-width="6" xlink:href="#avatarCircle"></use>
        
        <!-- Code Elements Background -->
        <g clip-path="url(#avatarClip)">
            <rect x="0" y="120" width="200" height="80" fill="#EEEEEE"></rect>
            
            <!-- Code Lines -->
            <g transform="translate(20, 130)" fill="#555555" opacity="0.7">
                <rect x="0" y="0" width="40" height="5" rx="2"></rect>
                <rect x="45" y="0" width="100" height="5" rx="2"></rect>
                
                <rect x="10" y="12" width="70" height="5" rx="2"></rect>
                <rect x="85" y="12" width="50" height="5" rx="2"></rect>
                
                <rect x="20" y="24" width="90" height="5" rx="2"></rect>
                <rect x="115" y="24" width="30" height="5" rx="2"></rect>
                
                <rect x="10" y="36" width="25" height="5" rx="2"></rect>
                <rect x="40" y="36" width="110" height="5" rx="2"></rect>
                
                <rect x="0" y="48" width="60" height="5" rx="2"></rect>
                <rect x="65" y="48" width="30" height="5" rx="2"></rect>
            </g>
            
            <!-- Code Brackets -->
            <g transform="translate(50, 40)">
                <path d="M20,10 L0,50 L20,90" stroke="#41B883" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M80,10 L100,50 L80,90" stroke="#3498db" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
            </g>
            
            <!-- JavaScript Icon -->
            <g transform="translate(85, 58)">
                <circle cx="15" cy="15" r="15" fill="#FFD84D"></circle>
                <text x="8" y="22" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333333">J</text>
            </g>
        </g>
    </g>
</svg> 